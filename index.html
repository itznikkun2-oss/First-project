<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
nav button{margin:5px;padding:10px;border:none;border-radius:5px;background:#38bdf8}
section{display:none;padding:20px}
.active{display:block}
input{padding:10px;margin:5px}
.msg{background:#1e293b;padding:8px;margin:5px;border-radius:5px}
.card{background:white;color:black;margin:10px;padding:10px;border-radius:10px}
img{width:100px;border-radius:10px}
</style>
</head>

<body>

<nav>
<button onclick="show('chat')">💬 Chat</button>
<button onclick="show('store')">🛒 Store</button>
<button onclick="show('insta')">📸 Insta</button>
</nav>

<!-- CHAT -->
<section id="chat" class="active">
<h2>Live Chat 💬</h2>
<div id="chatBox"></div>
<input id="chatMsg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</section>

<!-- STORE -->
<section id="store">
<h2>Store 🛒</h2>
<div class="card">T-shirt - ₹500 <button>Add</button></div>
<div class="card">Shoes - ₹1000 <button>Add</button></div>
</section>

<!-- INSTA -->
<section id="insta">
<h2>Insta Feed 📸</h2>
<input type="file" id="file">
<button onclick="upload()">Upload</button>
<div id="feed"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔑 APNA CONFIG */
const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

/* Tabs */
window.show = (id)=>{
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

/* Chat */
window.sendMsg = async ()=>{
  await addDoc(collection(db,"chat"),{
    text: chatMsg.value
  });
  chatMsg.value="";
};

onSnapshot(collection(db,"chat"),(snap)=>{
  chatBox.innerHTML="";
  snap.forEach(doc=>{
    chatBox.innerHTML += `<div class="msg">${doc.data().text}</div>`;
  });
});

/* Insta (fake preview) */
window.upload = ()=>{
  const file = document.getElementById("file").files[0];
  if(file){
    const url = URL.createObjectURL(file);
    feed.innerHTML += `<img src="${url}">`;
  }
};
</script>

</body>
</html>
