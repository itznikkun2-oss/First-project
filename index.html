<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Website</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    transition:0.4s;
    background:#0f172a;
    color:white;
}

/* Dark/Light */
.light{
    background:#f4f4f4;
    color:black;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#111;
    position:sticky;
    top:0;
    z-index:100;
}

nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

/* Hero */
.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:2.5rem;
}

/* Button */
.btn{
    padding:10px 20px;
    background:#38bdf8;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin-top:10px;
}

/* Cards */
.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    width:220px;
    border-radius:15px;
    opacity:0;
    transform:translateY(50px);
    transition:0.5s;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

/* Footer */
footer{
    text-align:center;
    padding:15px;
    background:#111;
}
</style>
</head>

<body>

<nav>
    <h2>MySite</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <button onclick="toggleMode()">🌙</button>
    </div>
</nav>

<div class="hero" id="home">
    <h1>Ultra Pro Website 🚀</h1>
    <p>Dark Mode + Animation + Smooth UI</p>
    <button class="btn">Explore</button>
</div>

<div class="cards" id="services">
    <div class="card">🔥 Fast Website</div>
    <div class="card">🎨 Modern Design</div>
    <div class="card">⚡ Smooth Animation</div>
</div>

<footer>
    <p>© 2026 Ultra Pro</p>
</footer>

<script>
function toggleMode(){
    document.body.classList.toggle("light");
}

/* Scroll animation */
window.addEventListener("scroll",()=>{
    document.querySelectorAll(".card").forEach(card=>{
        let top=card.getBoundingClientRect().top;
        if(top<window.innerHeight-50){
            card.classList.add("show");
        }
    });
});
</script>

</body>
</html>
