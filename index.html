<!DOCTYPE html>
<html>
<head>
    <title>Meri Website</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 20px;
        }

        .gallery img {
            width: 150px;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to Meri Website</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home">
    <h2>Home</h2>
    <p>Ye meri pehli website hai 😄</p>
</section>

<section id="about">
    <h2>About</h2>
    <p>Mera naam yahan likho. Main ek beginner web developer hoon.</p>
</section>

<section id="gallery" class="gallery">
    <h2>Gallery</h2>
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
</section>

<section id="contact">
    <h2>Contact</h2>
    <form>
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 Meri Website</p>
</footer>

</body>
</html>
