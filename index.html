<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Website</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.3);
}

nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

/* Hero */
.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:2.5rem;
}

/* Slider */
.slider{
    width:90%;
    max-width:500px;
    margin:30px auto;
    overflow:hidden;
    border-radius:15px;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 9s infinite;
}

.slides img{
    width:100%;
}

@keyframes slide{
    0%{margin-left:0;}
    33%{margin-left:-100%;}
    66%{margin-left:-200%;}
}

/* Cards */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    width:200px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.1);
}

/* Footer */
footer{
    text-align:center;
    padding:15px;
    background:#111;
}
</style>
</head>

<body>

<nav>
    <h2>MySite</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
    </div>
</nav>

<div class="hero">
    <h1>Welcome to My Website 🚀</h1>
    <p>Now with Animation & Slider 😎</p>
</div>

<!-- SLIDER -->
<div class="slider">
    <div class="slides">
        <img src="https://via.placeholder.com/500x300/ff7f7f">
        <img src="https://via.placeholder.com/500x300/7fbfff">
        <img src="https://via.placeholder.com/500x300/7fff7f">
    </div>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h3>Design</h3>
        <p>Modern UI</p>
    </div>
    <div class="card">
        <h3>Speed</h3>
        <p>Fast Website</p>
    </div>
    <div class="card">
        <h3>Support</h3>
        <p>24/7 Help</p>
    </div>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
