<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Slider Website</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    background:#0f172a;
    color:white;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#111;
}

nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

/* Hero */
.hero{
    text-align:center;
    padding:40px 20px;
}

/* Slider */
.slider{
    width:90%;
    max-width:600px;
    margin:30px auto;
    position:relative;
    overflow:hidden;
    border-radius:15px;
}

.slides{
    display:flex;
    transition:0.5s;
}

.slides img{
    width:100%;
    border-radius:15px;
}

/* Buttons */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.6);
    border:none;
    color:white;
    font-size:20px;
    padding:10px 15px;
    cursor:pointer;
    border-radius:50%;
}

.prev{left:10px;}
.next{right:10px;}

.btn:hover{
    background:#38bdf8;
}

/* Cards */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    width:200px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.1);
}

footer{
    text-align:center;
    padding:15px;
    background:#111;
}
</style>
</head>

<body>

<nav>
    <h2>MySite</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Services</a>
    </div>
</nav>

<div class="hero">
    <h1>Pro Slider Website 🚀</h1>
</div>

<!-- SLIDER -->
<div class="slider">
    <div class="slides" id="slideBox">
        <img src="https://picsum.photos/600/300?1">
        <img src="https://picsum.photos/600/300?2">
        <img src="https://picsum.photos/600/300?3">
    </div>

    <button class="btn prev" onclick="prevSlide()">❮</button>
    <button class="btn next" onclick="nextSlide()">❯</button>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">🔥 Fast</div>
    <div class="card">🎨 Design</div>
    <div class="card">⚡ Smooth</div>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

<script>
let index = 0;
const slides = document.getElementById("slideBox");
const total = slides.children.length;

function showSlide(){
    slides.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide(){
    index = (index + 1) % total;
    showSlide();
}

function prevSlide(){
    index = (index - 1 + total) % total;
    showSlide();
}

/* Auto slide */
setInterval(nextSlide,3000);
</script>

</body>
</html>
