<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App Ultra</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#111827;
}

nav{
  display:flex;
  justify-content:space-around;
  background:#1f2937;
  padding:10px;
}

nav button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-weight:bold;
}

section{
  display:none;
  padding:15px;
}

.active{display:block;}

.big{
  font-size:28px;
  text-align:center;
  margin-top:50px;
}

.card{
  background:white;
  color:black;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

img{
  width:100%;
  border-radius:10px;
}

.back{
  background:red;
  color:white;
  padding:8px;
  border:none;
  border-radius:8px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>🚀 Super App ULTRA</header>

<nav>
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('store')">🛒 Store</button>
<button onclick="openInsta()">📸 Insta</button>
</nav>

<!-- HOME PAGE -->
<section id="home" class="active">
<div class="big">
🔥 Welcome to My First Website 🔥
</div>

<div style="text-align:center;margin-top:30px;">
<button onclick="openInsta()">Open Instagram</button>
</div>
</section>

<!-- STORE PAGE -->
<section id="store">
<button class="back" onclick="show('home')">⬅ Back</button>

<h2>T-Shirt Store 👕</h2>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<p>Cool T-Shirt ₹500</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">
<p>Black Style T-Shirt ₹700</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
<p>Printed T-Shirt ₹650</p>
</div>

</section>

<script>

// Page switch
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// Instagram open
function openInsta(){
  window.open("https://www.instagram.com/nobita__shizuka__0?igsh=MTdibjRya2g0amwyMQ==", "_blank");
}

</script>

</body>
</html>
