<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro App</title>

<style>
body{font-family:sans-serif;text-align:center;background:#0f172a;color:white}
input,button{padding:10px;margin:5px;border:none;border-radius:5px}
button{background:#38bdf8}
</style>
</head>

<body>

<h2>Login / Signup 🔐</h2>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h3 id="user"></h3>

<hr>

<h2>Contact Form 📩</h2>
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YAHAN APNA CONFIG DALO */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* Signup */
window.signup = ()=>{
  createUserWithEmailAndPassword(auth,
    email.value, pass.value)
    .then(()=>alert("Signup success"))
    .catch(e=>alert(e.message));
};

/* Login */
window.login = ()=>{
  signInWithEmailAndPassword(auth,
    email.value, pass.value)
    .then(u=>{
      document.getElementById("user").innerText = u.user.email;
    })
    .catch(e=>alert(e.message));
};

/* Logout */
window.logout = ()=>{
  signOut(auth);
  user.innerText="";
};

/* Send message */
window.send = async ()=>{
  await addDoc(collection(db,"messages"),{
    text: msg.value
  });
  alert("Saved to database 😎");
};
</script>

</body>
</html>
