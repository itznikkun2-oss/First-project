<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    position: sticky;
    top:0;
}

nav h2{
    color:#fff;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:500;
}

nav a:hover{
    color:#ffd369;
}

/* Hero */
.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin:15px 0;
}

.hero button{
    padding:10px 20px;
    border:none;
    background:#ffd369;
    color:black;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

.hero button:hover{
    background:white;
}

/* Sections */
section{
    padding:50px 20px;
    text-align:center;
}

/* Cards */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    color:black;
    padding:20px;
    width:250px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

/* Footer */
footer{
    background:#111;
    padding:15px;
    text-align:center;
}

</style>
</head>

<body>

<nav>
    <h2>MySite</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
    </div>
</nav>

<div class="hero" id="home">
    <h1>Welcome to My Pro Website 🚀</h1>
    <p>Modern, Stylish & Responsive Design</p>
    <button onclick="alert('Welcome!')">Get Started</button>
</div>

<section id="about">
    <h2>About Me</h2>
    <p>Main ek beginner web developer hoon 😄</p>
</section>

<section id="services">
    <h2>My Services</h2>

    <div class="cards">
        <div class="card">
            <h3>Web Design</h3>
            <p>Modern UI design banata hoon</p>
        </div>

        <div class="card">
            <h3>Development</h3>
            <p>Fast aur responsive websites</p>
        </div>

        <div class="card">
            <h3>Support</h3>
            <p>24/7 help available</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 My Pro Website</p>
</footer>

</body>
</html>
